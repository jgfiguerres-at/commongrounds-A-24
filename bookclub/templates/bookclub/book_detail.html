{% extends 'bookclub/base_bookclub.html' %}

{% block title %}Book Club | {{ book.title }}{% endblock %}

{% block content %}
    <h3>{{ book.author }}</h3>
    <h4>{{ book.genre }}</h4>
    <h4>{{ book.publication_year }}</h4>
    <br>
    <p>{{ book.created_on}}</p>
    <p>{{ book.updated_on}}</p>
    <br>
    <br>
    <a href="{% url 'bookclub:book_list' %}">Return to book list</a>
{% endblock %}
