{% extends 'bookclub/base_bookclub.html' %}

{% block title %}Book Club | Book List{% endblock %}

{% block content %}
    <h3>Book List</h3>
    <ul>
      {% for book in books %}
        <li>
          <a href="{{ book.get_absolute_url }}">
            {{ book.title }} ({{ book.publication_year }})
          </a>
        </li>
      {% endfor %}
    </ul>
{% endblock %}
