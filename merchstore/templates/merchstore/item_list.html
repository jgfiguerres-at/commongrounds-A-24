{% extends 'base_item.html' %}

{% block title %}Merchstore Items{% endblock %}

{% block content %}
    <ul>
        {% for item in items.all %}
            <li>
                {{ item.name }} - {{ item.price }}
            </li>
        {% endfor %}
    </ul>
    <br>
    <br>
    <a href="{% url 'merchstore:item_list' %}">Return to item list</a>
{% endblock %}
