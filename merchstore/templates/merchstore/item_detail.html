{% extends 'merchstore/base_item.html' %}

{% block title %}Merchstore Items | {{ product.name }}{% endblock %}

{% block content %}
    <h3>{{ product.name }}</h3>
    <h4>{{ product.price }} | {{ product.product_type.name }}</h4>
    <br>
    <p>{{ product.description }}</p>
    <br>
    <br>
    <a href="{% url 'merchstore:item_list' %}">Return to items</a>
{% endblock %}
