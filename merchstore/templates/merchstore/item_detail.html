{% extends 'merchstore/base_item.html' %}

{% block title %}Merch Store | {{ product.name }}{% endblock %}

{% block content %}
    <h3>{{ product.name }}</h3>
    <h4>{{ product.type.name }}</h4>
    <h4>₱{{ product.price }}</h4>
    <br>
    <p>{{ product.description }}</p>
    <br>
    <br>
    <a href="{% url 'merchstore:item_list' %}">Return to item list</a>
{% endblock %}
