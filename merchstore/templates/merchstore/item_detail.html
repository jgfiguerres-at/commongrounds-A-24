{% extends 'merchstore/base_item.html' %}

{% block title %}Merchstore Items | {{ item.name }}{% endblock %}

{% block content %}
    <h3>{{ item.name }}</h3>
    <h4>{{ item.price }} | {{ item.type }}</h4>
    <br>
    <p>{{ item.description }}</p>
    <br>
    <br>
    <a href="{% url 'merchstore:item_list' %}">Return to item list</a>
{% endblock %}
