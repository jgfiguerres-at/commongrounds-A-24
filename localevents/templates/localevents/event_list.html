{% extends 'localevents/base_event.html' %}

{% block title %} Local Events | Event List{% endblock %}

{% block content %}
    <h3>Event List</h3>
    <ul>
        {% for event in events %}
            <li>
                <a href="{{ event.get_absolute_url }}">
                    {{ event.title }} - {{ event.location }},
                    {{ event.start_time|date:'M d, Y' }}
                </a>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
