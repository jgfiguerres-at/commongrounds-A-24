{% extends 'localevents/base_event.html' %}

{% block title %}Event Detail | {{ event.title }}{% endblock %}

{% block content %}
    <h3>{{ event.title }}</h3>
    <h4>{{ event.category }}</h4>
    <h4>{{ event.location }}</h4>
    <br>
    <p>From {{ event.start_time }} to {{ event.end_time }}</p>
    <br>
    <br>
    <br>
    <a href="{% url 'localevents:event_list' %}">Return to event list</a>
{% endblock %}
