{% extends 'commissions/base_commissions.html' %}

{% block title %}Commissions | Commission List{% endblock %}

{% block content %}
    <h3>Commission List</h3>
    <ul>
      {% for commission in commissions %}
        <li>
          <a href="{% url 'commissions:commission_detail' commission.pk %}">
            {{ commission.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
{% endblock %}
